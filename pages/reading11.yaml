title:      "Reading 11: Graphs (Paths, Flows)"
body:       |

    **Everyone**:

    Next week, we will work on more problems related to [graphs] and will focus
    on [hamiltonian paths] and [min-flow/max-cut] problems.  Understanding
    these concepts will be necessary to solve [Challenge 20] and [Challenge
    21].

    [Challenge 20]: challenge20.html
    [Challenge 21]: challenge21.html
    [graphs]: https://en.wikipedia.org/wiki/Graph_(abstract_data_type)
    [hamiltonian paths]: https://en.wikipedia.org/wiki/Hamiltonian_path
    [min-flow/max-cut]: https://en.wikipedia.org/wiki/Max-flow_min-cut_theorem

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - <p>19 Paths and circuits</p>
        - <p>20 Flows and cuts</p>

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

