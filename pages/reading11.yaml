    ## Submission

    To submit you work, follow the same process outlined in [Reading 00]:

        :::bash
        $ git switch master                   # Make sure we are in master branch
        $ git pull --rebase                   # Make sure we are up-to-date with github

        $ git switch -c reading11             # Create reading11 branch and check it out

        $ cd reading11                        # Go into reading11 folder
        $ $EDITOR answers.json                # Edit your answers.json file

        $ ../.scripts/check.py                # Check reading11 quiz
        Checking reading11 quiz ...
             Q01  4.00 /  4.00
             Q02  2.00 /  2.00
             Q03  3.00 /  3.00
             Q04  3.00 /  3.00
             Q05  5.00 /  5.00
             Q06  3.00 /  3.00
          --------------------
           Score 20.00 / 20.00
           Grade  1.00 /  1.00
          Status Success

        $ git add answers.json                # Add answers.json to staging area
        $ git commit -m "Reading 11: Quiz"    # Commit work

        $ git push -u origin reading11        # Push branch to github

