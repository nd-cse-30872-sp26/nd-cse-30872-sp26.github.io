title:      "Reading 10: Graphs (Shortest Paths)"
body:       |

    **Everyone**:

    Next week, we will continue to work on problems related to [graphs] and
    will focus on computing the minimum spanning tree of a graph and
    determining a topological ordering of a [DAG].  Understanding these
    concepts will be necessary to solve [Challenge 18] and [Challenge 19].

    [Challenge 18]: challenge18.html
    [Challenge 19]: challenge19.html
    [graphs]: https://en.wikipedia.org/wiki/Graph_(abstract_data_type)
    [DAG]: https://en.wikipedia.org/wiki/Directed_acyclic_graph

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - <p>15. Spanning Trees</p>
        - <p>16. Directed Graphs</p>

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

