title:      "Reading 09: Graphs (Shortest Paths)"
body:       |

    **Everyone**:

    Next week, we will continue to work on problems related to [graphs] and
    will focus on computing the shortest path in a graph.  Understanding these
    concepts will be necessary to solve [Challenge 17].

    [Challenge 17]: challenge17.html
    [graphs]:       https://en.wikipedia.org/wiki/Graph_(abstract_data_type)

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - <p>13. Shortest paths</p>

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

