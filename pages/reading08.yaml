title:      "Reading 08: Graphs (Representation, Traversals)"
body:       |

    **Everyone**:

    Next week, we will work on problems related to [graphs] and will focus on
    representing them and traversing them.  Understanding these concepts will be
    necessary to solve [Challenge 15] and [Challenge 16].

    [Challenge 15]: challenge16.html
    [Challenge 16]: challenge16.html
    [graphs]: https://en.wikipedia.org/wiki/Graph_(abstract_data_type)

    ## Reading

    The readings for this week are:

    1.  <div class="flex-col" markdown="1">

        [Competitive Programmer's Handbook]

        - Chapter 11 - Basics of graphs
        - Chapter 12 - Graph traversal

    2.  <div class="flex-col" markdown="1">

        [Data Structures Handbook](https://www.thedshandbook.com/)

        - [Graphs](https://www.thedshandbook.com/graphs/)
        - [Breadth First Search](https://www.thedshandbook.com/breadth-first-search/)
        - [Depth First Search](https://www.thedshandbook.com/depth-first-search/)

    [C++]:      https://isocpp.org/
    [Python]:   https://www.python.org/

