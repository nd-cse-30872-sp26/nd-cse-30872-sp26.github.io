title:      "Challenge 15: Isolated Circuits"
body:       |

    The **CPEGs are struggling**.  They are trying to get sand to think, but it
    turns out that laying out chips is kind of, actually, really hard.  One
    issue is that a system usually consists of **several circuits that
    internally consist of multiple chips** connected to each other.

    <div class="centered">
      <img src="static/img/challenge15-circuits.png" class="responsive">
    </div>

    To place and route these circuits, it is useful to know how many of these
    circuits are isolated or separate from each other.  Determining how many
    circuits (ie. *group of chips*) are isolated from each other, however, is
    proving to be a difficult task.

    Fortunately, you know a thing or two about **graphs**, so you are ready to
    step in and help out the **CPEGs** with this problem:

    > Given a **n x n matrix** detailing which chips are connected to each
    other, determine **how many isolated circuits there are** in the system.

    ## Input

    You will be given a series of systems in the form of a **n x n matrix**
    that records which chips are connected to other chips within the system.

    ### Example Input

        :::text
        3       # Number of vertices
        1 1 0   # Adjacency Matrix
        1 1 0
        0 0 1
        3
        1 0 0
        0 1 0
        0 0 1

    ## Output

    For each system, you are to determine the number of **isolated circuits**,
    that is groups of chips that are not connected to chips outside the group,
    within the system and print out the result in the following format:

        :::text
        System # isolated circuits: # of isolated circuits

    ### Example Output

        :::text
        System 1 isolated circuits: 2
        System 2 isolated circuits: 3

    <div class="alert danger-bg" markdown="1">

    ### <i class="icon icon-medium">{{ "scale-balance" | embed_icon }}</i> Algorithmic Complexity

    For each input test case, your solution should have the following targets:

    <table class="bordered" markdown="1">
    <tbody markdown="1">
    <tr class="caution-bg" markdown="1">
      <td width="155px" markdown="1">**Time Complexity**</td>
      <td markdown="1">`O(N)`, where `N` is the number of chips in the system.</td>
    </tr>
    <tr class="danger-bg" markdown="1">
      <td markdown="1">**Space Complexity**</td>
      <td markdown="1">`O(N)`, where `N` is the number of chips in the system.</td>
    </tr>
    </tbody>
    </table>

    Your solution may be below the targets, but it **should not exceed them**.

    </div>

    ## Submission

    To submit your work, follow the same procedure you used for [Reading 00]:

        :::bash
        $ cd path/to/cse-30872-sp26-assignments     # Go to assignments repository
        $ git switch master                         # Make sure we are on master
        $ git pull --rebase                         # Pull any changes from GitHub

        $ git switch -c challenge15                 # Create and checkout challenge15 branch

        $ $EDITOR challenge15/program.cpp           # Edit your code

        $ git add challenge15/program.cpp           # Stage your changes
        $ git commit -m "Challenge 15: Code"        # Commit your changes

        $ git push -u origin challenge15            # Send changes to GitHub

