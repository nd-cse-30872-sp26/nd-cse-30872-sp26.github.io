title:      "Reading 12: Primes, Modular Arithmetic"
body:       |

    **Everyone**:

    Next week, we will work on a problem related to [number theory] and will
    focus on [primes] and [modular arithmetic].  Understanding these
    concepts will be necessary to solve [Challenge 22].

    [Challenge 21]:         challenge22.html
    [number theory]:        https://en.wikipedia.org/wiki/Number_theory
    [primes]:               https://en.wikipedia.org/wiki/Prime_number
    [modular arithmetic]:   https://en.wikipedia.org/wiki/Modular_arithmetic

